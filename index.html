<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
      body { max-width: 500px; margin: auto; text-align: center; }
      #reader { width: 100%; border: 2px solid #ddd; border-radius: 8px; margin: 20px 0; }
      .button-full { width: 100%; font-size: 1.2rem; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>💰 Classroom POS</h1>
    
    <label>Transaction Type</label>
    <select id="actionSelect" onchange="updateDropdown()"></select>
    
    <label>Select Item/Goal</label>
    <select id="itemSelect"></select>
    
    <button class="button-full" onclick="startScan()">📷 Start Scanner</button>
    <div id="reader"></div>

    <script>
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw89wtWWnNKUK4Aev3Y06Yu4CI7TTpkndiMviWvDEzSZaUWi03ZS-2it0Gu8vY2UMRM/exec"; 

      // 1. Wait for the page to fully load
      window.addEventListener('load', () => {
        const actionSelect = document.getElementById('actionSelect');
        // Define the options manually here to ensure they exist
        actionSelect.innerHTML = '<option value="Sale">Store Sale</option><option value="Reward">Reward/Income</option>';
        updateDropdown(); // Now it will run correctly
      });

      async function callServer(payload) {
        // We add 'mode: "no-cors"' to ensure the browser doesn't block the request
        const response = await fetch(WEB_APP_URL, { 
          method: "POST", 
          body: JSON.stringify(payload) 
        });
        return await response.json();
      }

      async function updateDropdown() {
        const action = document.getElementById('actionSelect').value;
        const select = document.getElementById('itemSelect');
        
        // Let the user know it's loading
        select.innerHTML = '<option>Loading...</option>';
        
        const data = await callServer({ action: action === "Sale" ? "getItems" : "getGoals" });
        
        select.innerHTML = '';
        data.forEach(row => {
          let opt = document.createElement('option');
          opt.value = row[1]; 
          opt.text = row[0] + " ($" + row[1] + ")";
          select.appendChild(opt);
        });
      }

      function startScan() {
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (data) => {
          scanner.stop();
          const amount = document.getElementById('itemSelect').value;
          const desc = document.getElementById('itemSelect').options[document.getElementById('itemSelect').selectedIndex].text;
          const result = await callServer({ 
            action: "processTransaction", 
            studentID: data, 
            amount: amount, 
            type: document.getElementById('actionSelect').value, 
            description: desc 
          });
          alert(result.success ? "Success! Balance updated." : result.message);
        });
      }
    </script>
  </body>
</html>
