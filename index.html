<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="https://drive.google.com/uc?id=1J5VOPR10n0AcOZwQlCvSxiKuIBV8cTrw">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
      body { max-width: 500px; margin: auto; text-align: center; font-size: 1.2rem; }
      select, button { font-size: 1.5rem !important; padding: 15px !important; margin: 10px 0 !important; width: 100% !important; }
      h1 { font-size: 2rem; }
      #reader { width: 100%; border: 4px solid #333; border-radius: 12px; margin: 20px 0; }
      .secondary { background-color: #555; color: white; }
    </style>
  </head>
  <body>
    <h1>💰 Classroom POS</h1>
    
    <label>Action</label>
    <select id="actionSelect" onchange="updateDropdown()">
      <option value="Sale">Store Sale</option>
      <option value="Reward">Reward/Income</option>
      <option value="Custom">Custom Reward</option>
      <option value="Pool">Group Purchase (Split Bill)</option>
    </select>
    
    <select id="itemSelect"></select>
    
    <button class="secondary" onclick="payClass()">🚀 Pay Class Bonus</button>
    <button onclick="confirmAndScan()">📷 Start Scanner</button>
    
    <div id="reader"></div>

    <script>
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzsSbIVAYBm9lNZcvYTy0JSBiFGeRB7Rv01MfkaKB0NQNpns89-3IEsi_M7JTFUP9ET/exec";
      let isPooling = false, studentsToPool = 0, studentsScanned = 0, finalPrice = 0;

      async function callServer(payload) {
        const response = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
        return await response.json();
      }

      async function updateDropdown() {
        const action = document.getElementById('actionSelect').value;
        const data = await callServer({ action: (action === "Sale" || action === "Pool") ? "getItems" : "getGoals" });
        const select = document.getElementById('itemSelect');
        select.innerHTML = '';
        select.style.display = (action === "Custom") ? "none" : "block";
        if (action !== "Custom") {
          data.forEach(row => {
            let opt = document.createElement('option');
            opt.value = row[1]; opt.text = row[0] + " ($" + row[1] + ")";
            select.appendChild(opt);
          });
        }
      }

      async function confirmAndScan() {
        const action = document.getElementById('actionSelect').value;
        let amount = 0;
        if (action === "Custom") {
          amount = parseFloat(prompt("Enter custom reward amount:", "50"));
          if (!amount || isNaN(amount)) return alert("Invalid amount.");
        } else {
          amount = parseFloat(document.getElementById('itemSelect').value);
          if (!amount) return alert("Please select an item.");
        }
        const tax = (action === "Sale" || action === "Pool") ? 0.13 : 0;
        finalPrice = (amount * (1 + tax)).toFixed(2);
        if(action === "Pool") {
            studentsToPool = parseInt(prompt("How many students are splitting the total of $"+finalPrice+"?", "2"));
            finalPrice = (finalPrice / studentsToPool).toFixed(2);
            isPooling = true;
        } else { isPooling = false; }
        if(confirm(`Amount per student: $${finalPrice}. Confirm?`)) { startScan(); }
      }

      function startScan() {
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (data) => {
          scanner.stop();
          const result = await callServer({ 
            action: isPooling ? "poolTransaction" : "processTransaction", 
            studentID: data, amount: finalPrice, 
            type: document.getElementById('actionSelect').value, 
            description: "Purchase/Reward" 
          });
          if(result.success) {
            alert("✅ SUCCESS!");
            if(isPooling) {
                studentsScanned++;
                if(studentsScanned < studentsToPool) { alert(`Next student...`); startScan(); }
                else { alert("All done!"); isPooling = false; studentsScanned = 0; }
            }
          } else { alert("❌ DECLINED: " + result.message); isPooling = false; }
        });
      }

      async function payClass() {
        const amt = prompt("How many credits for every student?", "100");
        if(amt && confirm("Give "+amt+" credits to everyone?")) {
            const res = await callServer({ action: "payClass", amount: amt });
            alert(res.success ? "Bonus sent!" : "Error");
        }
      }
      updateDropdown();
    </script>
  </body>
</html>
