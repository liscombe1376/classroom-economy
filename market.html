<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wall Street | ClassBank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0b0f1a; 
            color: #f8fafc; 
        }
        .glass-card { background: #161d2f; border: 1px solid #2d3748; }
        
        /* Modal for Chart */
        #chartModal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: #161d2f;
            margin: 10% auto;
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            border: 1px solid #2d3748;
        }
        input[type="number"]::-webkit-inner-spin-button { opacity: 1; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <button onclick="location.href='student.html'" class="text-blue-400 hover:text-blue-300 font-bold flex items-center gap-2 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
                Back to Bank
            </button>
            <button onclick="loadMarketData()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-sm font-bold transition flex items-center gap-2 shadow-lg shadow-blue-900/20">
                🔄 Refresh Market
            </button>
        </div>

        <h1 class="text-3xl font-bold mb-8 text-white">📈 Wall Street Exchange</h1>

        <div class="glass-card p-6 rounded-2xl mb-8 border-l-4 border-blue-500">
            <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-4">My Personal Holdings</h3>
            <div id="myHoldings" class="overflow-x-auto">
                <p class="text-slate-500 animate-pulse">Loading shares...</p>
            </div>
        </div>

        <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-4 ml-1">Market Listings</h3>
        <div id="marketList" class="space-y-4">
            </div>
    </div>

    <div id="chartModal">
        <div class="modal-content shadow-2xl">
            <div id="chart_div" style="width: 100%; height: 300px;" class="rounded-lg overflow-hidden mb-4"></div>
            <button onclick="document.getElementById('chartModal').style.display='none'" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-xl transition">
                Close Trend
            </button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwvxl71LVk2Z1SohSZtrAbWRFRvpoUCrtXN3E7T6sdl9Q-bNG2-uUZggq9BU1WUOzT4/exec";
        let studentID = localStorage.getItem('studentID'); 

        google.charts.load('current', {'packages':['corechart']});

        async function loadMarketData() {
            try {
                const res = await fetch(WEB_APP_URL, { 
                    method: "POST", 
                    body: JSON.stringify({ action: "getMarketData" }) 
                });
                const market = await res.json();
                
                const studentRes = await fetch(WEB_APP_URL, { 
                    method: "POST", 
                    body: JSON.stringify({ 
                        action: "loginStudent", 
                        name: localStorage.getItem('studentName'), 
                        password: localStorage.getItem('studentPass') 
                    }) 
                });
                const sData = await studentRes.json();
                
                renderPortfolio(sData.student.portfolio, market);
                renderMarket(market);
            } catch (e) {
                console.error("Load failed", e);
            }
        }

        function renderPortfolio(portfolio, market) {
            const container = document.getElementById('myHoldings');
            if (!portfolio || portfolio.length === 0 || !portfolio.some(i => i.shares > 0)) {
                container.innerHTML = "<p class='text-slate-500 italic text-sm py-2'>No stocks owned in your portfolio.</p>";
                return;
            }
            let html = `
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-500 text-[10px] uppercase tracking-widest border-b border-slate-800">
                            <th class="pb-2">Stock</th>
                            <th class="pb-2 text-center">Shares</th>
                            <th class="pb-2 text-right">Market Value</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-800">`;
            
            portfolio.forEach(item => {
                const stock = market.find(m => m[0] === item.ticker);
                if(item.shares > 0) {
                    const currentVal = (item.shares * stock[2]).toFixed(2);
                    html += `
                        <tr class="text-sm">
                            <td class="py-3 font-bold text-white">${item.ticker}</td>
                            <td class="py-3 text-center text-slate-300">${item.shares}</td>
                            <td class="py-3 text-right text-emerald-400 font-mono font-bold">$${currentVal}</td>
                        </tr>`;
                }
            });
            html += "</tbody></table>";
            container.innerHTML = html;
        }

        function renderMarket(market) {
            const list = document.getElementById('marketList');
            list.innerHTML = '';
            market.forEach(stock => {
                const isUp = parseFloat(stock[4]) >= 0;
                const card = document.createElement('div');
                card.className = 'glass-card p-5 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-4 transition hover:border-slate-600';
                card.innerHTML = `
                    <div class="flex-1 w-full md:w-auto">
                        <div class="flex items-center gap-2">
                            <strong class="text-xl text-white font-bold">${stock[0]}</strong>
                            <span class="text-slate-500 text-[10px] uppercase font-bold tracking-tighter">${stock[1]}</span>
                        </div>
                        <button onclick="showChart('${stock[0]}')" class="mt-2 text-blue-400 hover:text-white text-[10px] font-bold uppercase tracking-widest flex items-center gap-1 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" />
                            </svg> View Trend
                        </button>
                    </div>
                    
                    <div class="text-center md:text-right flex-1 w-full md:w-auto border-y md:border-none border-slate-800 py-3 md:py-0">
                        <div class="text-2xl font-mono font-bold text-white">$${parseFloat(stock[2]).toFixed(2)}</div>
                        <div class="text-sm font-bold ${isUp ? 'text-emerald-400' : 'text-rose-400'}">
                            ${isUp ? '▲' : '▼'} ${stock[4]}%
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-2 w-full md:w-auto">
                        <input type="number" id="qty-${stock[0]}" placeholder="Qty" min="1" 
                            class="w-full md:w-20 bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-white focus:outline-none focus:border-blue-500 font-bold">
                        <div class="flex gap-2">
                            <button onclick="executeTrade('${stock[0]}', 'BUY')" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-xl text-xs font-bold transition">BUY</button>
                            <button onclick="executeTrade('${stock[0]}', 'SELL')" class="bg-rose-600 hover:bg-rose-500 text-white px-4 py-2 rounded-xl text-xs font-bold transition">SELL</button>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function showChart(ticker) {
            document.getElementById('chartModal').style.display = 'block';
            const res = await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ action: "getStockHistory", ticker: ticker })
            });
            const historyData = await res.json();

            const data = new google.visualization.DataTable();
            data.addColumn('datetime', 'Time');
            data.addColumn('number', 'Price');
            historyData.forEach(row => data.addRow([new Date(row[0]), row[1]]));

            const options = {
                title: ticker + ' Price Performance',
                curveType: 'function',
                legend: { position: 'none' },
                backgroundColor: 'transparent',
                hAxis: { textPosition: 'none', gridlines: {color: '#2d3748'} },
                vAxis: { gridlines: {color: '#2d3748'}, textStyle: {color: '#94a3b8'} },
                titleTextStyle: { color: '#f8fafc', fontSize: 16, bold: true },
                colors: ['#3b82f6'],
                lineWidth: 4,
                chartArea: { width: '90%', height: '80%' }
            };
            const chart = new google.visualization.LineChart(document.getElementById('chart_div'));
            chart.draw(data, options);
        }

        async function executeTrade(ticker, type) {
            const qty = document.getElementById(`qty-${ticker}`).value;
            if (!qty || qty <= 0) return alert("Enter a valid quantity!");
            
            const confirmMsg = type === "BUY" ? `Buy ${qty} shares of ${ticker}?` : `Sell ${qty} shares of ${ticker}?`;
            if(!confirm(confirmMsg)) return;

            const res = await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "tradeStock",
                    studentID: studentID,
                    ticker: ticker,
                    quantity: parseInt(qty),
                    type: type
                })
            });
            const data = await res.json();
            if (data.success) { 
                alert("Trade executed successfully!"); 
                loadMarketData(); 
            } else { 
                alert("Trade Declined: " + data.message); 
            }
        }

        // Initial Load
        loadMarketData();

        // Auto-refresh market every 2 minutes
        setInterval(loadMarketData, 120000);
    </script>
</body>
</html>
