<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        .up { color: #2ecc71; font-weight: bold; }
        .down { color: #ff4757; font-weight: bold; }
        
        .portfolio-section { 
            background: #1e272e !important; 
            color: #ffffff !important;
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            border: 2px solid #3498db; 
        }

        #myHoldings table { background: #2f3542; color: white; width: 100%; border-radius: 8px; overflow: hidden; }
        #myHoldings th { background: #57606f; color: white; }
        #myHoldings td { border-bottom: 1px solid #57606f; color: white !important; }

        .market-card { 
            border: 1px solid #444; 
            background: #2f3542; 
            color: #fff; 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .trade-controls { display: flex; gap: 5px; }
        input[type="number"] { width: 70px; background: #f1f2f6; color: black; }
        
        /* Modal for Chart */
        #chartModal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
        }
        .modal-content {
            background-color: #2f3542;
            margin: 10% auto;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            text-align: center;
        }
    </style>
</head>
<body>
    <button onclick="location.href='student.html'">⬅️ Back to Bank</button>
    <button onclick="loadMarketData()" style="background: #3498db;">🔄 Refresh Market</button>

    <h1>📈 Wall Street</h1>

    <div class="portfolio-section">
        <h3>My Portfolio</h3>
        <div id="myHoldings">Loading shares...</div>
    </div>

    <h3>Market Listings</h3>
    <div id="marketList"></div>

    <div id="chartModal">
        <div class="modal-content">
            <div id="chart_div" style="width: 100%; height: 300px;"></div>
            <button onclick="document.getElementById('chartModal').style.display='none'">Close Trend</button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxgRIXNm8Y7YIqnIP1yZ1bzcHLMz2BsYuYqfj6SzAgyFSr5JdpAPbHBxZKYxejVQ5v7/exec";
        let studentID = localStorage.getItem('studentID'); 

        google.charts.load('current', {'packages':['corechart']});

        async function loadMarketData() {
            const res = await fetch(WEB_APP_URL, { 
                method: "POST", 
                body: JSON.stringify({ action: "getMarketData" }) 
            });
            const market = await res.json();
            
            const studentRes = await fetch(WEB_APP_URL, { 
                method: "POST", 
                body: JSON.stringify({ 
                    action: "loginStudent", 
                    name: localStorage.getItem('studentName'), 
                    password: localStorage.getItem('studentPass') 
                }) 
            });
            const sData = await studentRes.json();
            
            renderPortfolio(sData.student.portfolio, market);
            renderMarket(market);
        }

        function renderPortfolio(portfolio, market) {
            const container = document.getElementById('myHoldings');
            if (!portfolio || portfolio.length === 0) {
                container.innerHTML = "<p>No stocks owned.</p>";
                return;
            }
            let html = "<table><thead><tr><th>Stock</th><th>Shares</th><th>Value</th></tr></thead><tbody>";
            portfolio.forEach(item => {
                const stock = market.find(m => m[0] === item.ticker);
                if(item.shares > 0) {
                    const currentVal = (item.shares * stock[2]).toFixed(2);
                    html += `<tr><td>${item.ticker}</td><td>${item.shares}</td><td>$${currentVal}</td></tr>`;
                }
            });
            html += "</tbody></table>";
            container.innerHTML = html;
        }

        function renderMarket(market) {
            const list = document.getElementById('marketList');
            list.innerHTML = '';
            market.forEach(stock => {
                const isUp = parseFloat(stock[4]) >= 0;
                const card = document.createElement('div');
                card.className = 'market-card';
                card.innerHTML = `
                    <div>
                        <strong>${stock[1]} (${stock[0]})</strong><br>
                        <button onclick="showChart('${stock[0]}')" style="background: #3498db; padding: 2px 8px; font-size: 0.8em;">Trend 📈</button>
                    </div>
                    <div style="text-align: right;">
                        <span style="font-size: 1.2em;">$${parseFloat(stock[2]).toFixed(2)}</span><br>
                        <span class="${isUp ? 'up' : 'down'}">${isUp ? '▲' : '▼'} ${stock[4]}</span>
                    </div>
                    <div class="trade-controls">
                        <input type="number" id="qty-${stock[0]}" placeholder="Qty" min="1">
                        <button onclick="executeTrade('${stock[0]}', 'BUY')" style="background: #2ecc71;">Buy</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function showChart(ticker) {
            document.getElementById('chartModal').style.display = 'block';
            const res = await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ action: "getStockHistory", ticker: ticker })
            });
            const historyData = await res.json();

            const data = new google.visualization.DataTable();
            data.addColumn('datetime', 'Time');
            data.addColumn('number', 'Price');
            historyData.forEach(row => data.addRow([new Date(row[0]), row[1]]));

            const options = {
                title: ticker + ' Price History',
                curveType: 'function',
                legend: { position: 'none' },
                backgroundColor: '#2f3542',
                hAxis: { textPosition: 'none', gridlines: {color: '#444'} },
                vAxis: { gridlines: {color: '#444'}, textStyle: {color: '#fff'} },
                titleTextStyle: { color: '#fff' },
                colors: ['#2ecc71']
            };
            const chart = new google.visualization.LineChart(document.getElementById('chart_div'));
            chart.draw(data, options);
        }

        async function executeTrade(ticker, type) {
            const qty = document.getElementById(`qty-${ticker}`).value;
            if (!qty || qty <= 0) return alert("Enter a quantity!");
            const res = await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "tradeStock",
                    studentID: studentID,
                    ticker: ticker,
                    quantity: parseInt(qty),
                    type: type
                })
            });
            const data = await res.json();
            if (data.success) { alert("Success!"); loadMarketData(); }
            else { alert("Failed: " + data.message); }
        }

        loadMarketData();
    </script>
</body>
</html>
