<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard | ClassBank</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: #0b0f1a; 
      color: #f8fafc; 
      margin: 0;
      padding: 20px;
    }

    .glass-card { 
      background: #161d2f; 
      border: 1px solid #2d3748; 
      border-radius: 1.5rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    /* Column Hover Effects */
    .column-card {
      transition: transform 0.3s ease, border-color 0.3s ease;
    }
    .column-card:hover {
      transform: translateY(-8px);
      border-color: #3b82f6;
    }

    /* Badge Styles */
    .badge-base {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    
    .gold-badge { 
      background: radial-gradient(circle, #f1c40f, #d4af37); 
      border-radius: 50%; 
      box-shadow: 0 0 30px rgba(241, 196, 15, 0.3); 
    }
    
    .emerald-badge { 
      background: linear-gradient(135deg, #2ecc71, #27ae60); 
      border-radius: 20%; 
      box-shadow: 0 0 30px rgba(46, 204, 113, 0.4); 
    }
    
    .crystal-badge { 
      background: rgba(255, 255, 255, 0.05); 
      backdrop-filter: blur(10px); 
      border: 2px solid #3b82f6; 
      transform: rotate(45deg); 
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
    }
    .crystal-badge span { transform: rotate(-45deg); }

    /* Rank Text Colors */
    .gold-text { color: #f1c40f; } 
    .silver-text { color: #bdc3c7; } 
    .bronze-text { color: #cd7f32; }
  </style>
</head>
<body>

  <div class="max-w-6xl mx-auto">
    <div class="mb-8">
      <a href="admin.html" class="inline-flex items-center text-sm font-semibold text-blue-400 hover:text-blue-300 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Admin Panel
      </a>
    </div>

    <div class="text-center mb-10">
      <h1 class="text-4xl md:text-5xl font-bold text-white mb-2 tracking-tight">
        🏆 Classroom <span class="text-amber-400">Hall of Fame</span>
      </h1>
      <p class="text-slate-500 font-medium italic" id="period">Calculating weekly window...</p>
    </div>
    
    <div class="glass-card p-6 mb-12 max-w-3xl mx-auto border-amber-500/30">
      <div class="text-center">
        <div class="text-amber-500 text-xs font-bold uppercase tracking-widest mb-2">🎖️ Last Week's Champions</div>
        <div id="winners-display" class="text-lg md:text-xl font-semibold text-slate-200">Loading history...</div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12" id="board">
      <div class="text-center text-slate-500 py-20 col-span-3">
        <div class="inline-block animate-pulse text-xl">Gathering the data...</div>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyxIWLy0J30R7w2cnlTN9EFiGUt4UoSqqu54MYPD6a_s6O6AVldVnxrgZHEVY03ChG4/exec";

    async function loadLeaderboard() {
      try {
        const response = await fetch(WEB_APP_URL, { 
          method: "POST", 
          body: JSON.stringify({ action: "getLeaderboard" }) 
        });
        const data = await response.json();

        const winResponse = await fetch(WEB_APP_URL, { 
          method: "POST", 
          body: JSON.stringify({ action: "getLastWinners" }) 
        });
        const lastWinners = await winResponse.json();
        
        const hofDisplay = document.getElementById('winners-display');
        if (lastWinners.wealth && lastWinners.wealth !== "None") {
          hofDisplay.innerHTML = `
            <span class="inline-block mx-2">💰 ${lastWinners.wealth}</span>
            <span class="text-slate-700 mx-2">|</span>
            <span class="inline-block mx-2">🌟 ${lastWinners.achievers}</span>
            <span class="text-slate-700 mx-2">|</span>
            <span class="inline-block mx-2">📈 ${lastWinners.savers}</span>
          `;
        } else {
          hofDisplay.innerText = "No winners recorded yet for the season!";
        }

        document.getElementById('period').innerText = data.period;
        const board = document.getElementById('board');
        board.innerHTML = '';

        board.innerHTML += renderCol("Wealth Master", "gold-badge", "💰", data.wealth, "Top Weekly Income");
        board.innerHTML += renderCol("Goal Crusher", "emerald-badge", "🌟", data.achievers, "Top Weekly Rewards");
        board.innerHTML += renderCol("Super Saver", "crystal-badge", "<span>📈</span>", data.savers, "Top Interest Gained");

      } catch (err) {
        console.error(err);
        document.getElementById('board').innerHTML = "<div class='col-span-3 text-rose-500'>Error loading data. Make sure you deployed as a New Version.</div>";
      }
    }

    function renderCol(title, style, icon, winners, subtext) {
      let html = `
        <div class="glass-card p-8 text-center column-card flex flex-col h-full">
          <div class="badge-base ${style}">${icon}</div>
          <h2 class="text-2xl font-bold text-white mb-1">${title}</h2>
          <p class="text-slate-500 text-sm mb-8">${subtext}</p>
          <div class="space-y-4 flex-grow text-left">
      `;

      if (!winners || winners.length === 0) {
        html += `
          <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800 text-center text-slate-500 italic">
            No entries yet!
          </div>`;
      } else {
        winners.forEach((w, i) => {
          let rankColors = ["gold-text", "silver-text", "bronze-text"];
          let medals = ["🥇", "🥈", "🥉"];
          let winDisplay = (w.wins && w.wins > 0) ? `<span class="ml-2 text-[10px] bg-amber-500/10 text-amber-500 px-2 py-0.5 rounded-full border border-amber-500/20">${w.wins}x 🏆</span>` : "";
          
          html += `
            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800 flex items-center">
              <div class="text-2xl mr-4 w-8 text-center ${rankColors[i]} font-bold">${medals[i]}</div>
              <div class="flex-grow">
                <div class="text-white font-bold text-sm leading-tight">${w.name}${winDisplay}</div>
                <div class="text-emerald-400 font-mono text-sm mt-1">$${w.amount.toFixed(2)}</div>
              </div>
            </div>`;
        });
      }

      html += `</div></div>`;
      return html;
    }

    loadLeaderboard();
  </script>
</body>
</html>
