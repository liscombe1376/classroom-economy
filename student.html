<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassBank Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f1a;
            color: #f8fafc;
        }

        .glass-card {
            background: #161d2f;
            border: 1px solid #2d3748;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        input {
            background: #1f2937 !important;
            border: 1px solid #374151 !important;
            color: white !important;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #3b82f6 !important;
            ring: 2px #3b82f6;
            outline: none;
        }

        #bankSection { display: none; }

        .pos { color: #10b981; font-weight: bold; }
        .neg { color: #f43f5e; font-weight: bold; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0f1a; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-start justify-center p-4 md:p-8">

    <div id="loginSection" class="w-full max-w-md glass-card rounded-3xl p-8 space-y-6 mt-20">
        <div class="text-center">
            <h1 class="text-4xl font-extrabold text-white tracking-tight">💰 ClassBank</h1>
            <p class="text-slate-400 mt-2">Secure Student Access</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Identity</label>
                <input type="text" id="name" placeholder="Full Name" class="w-full px-4 py-3 rounded-xl">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Access Key</label>
                <input type="password" id="pass" placeholder="Password" class="w-full px-4 py-3 rounded-xl">
            </div>
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition duration-200 shadow-lg shadow-blue-900/20">
                Sign In
            </button>
        </div>
    </div>

    <div id="bankSection" class="w-full max-w-2xl space-y-6 mx-auto">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4">
            <h1 id="displayName" class="text-3xl font-bold text-white tracking-tight"></h1>
            <button onclick="location.href='market.html'" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold px-6 py-3 rounded-2xl shadow-xl transition-all active:scale-95 flex items-center gap-2">
                📈 Wall Street Market
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="glass-card p-6 rounded-2xl border-l-4 border-blue-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Checking</p>
                <h2 id="balanceDisplay" class="text-4xl font-bold mt-2 font-mono">$0.00</h2>
            </div>
            <div class="glass-card p-6 rounded-2xl border-l-4 border-purple-500">
                <div class="flex justify-between items-center">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Savings</p>
                    <span class="bg-purple-900/30 text-purple-400 text-[10px] px-2 py-0.5 rounded-full border border-purple-500/30">5% APY</span>
                </div>
                <h2 id="savingsDisplay" class="text-4xl font-bold mt-2 text-purple-400 font-mono">$0.00</h2>
            </div>
        </div>

        <div id="portfolioSection" class="glass-card p-6 rounded-2xl border-l-4 border-emerald-500" style="display:none;">
            <h3 class="text-emerald-400 text-xs font-bold uppercase tracking-widest mb-4 font-bold">📂 My Stock Portfolio</h3>
            <div id="portfolioBody"></div>
        </div>

        <div class="glass-card p-6 rounded-2xl">
            <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-4">💸 Internal Transfer</h3>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="number" id="transferAmount" placeholder="Amount $0.00" class="flex-grow px-4 py-3 rounded-xl font-bold text-lg">
                <div class="flex gap-2">
                    <button onclick="transfer('toSavings')" class="bg-purple-600 hover:bg-purple-500 text-white px-6 py-3 rounded-xl font-bold transition flex-1">Save ➡️</button>
                    <button onclick="transfer('toChecking')" class="bg-slate-700 hover:bg-slate-600 text-white px-6 py-3 rounded-xl font-bold transition flex-1">Spend ⬅️</button>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-2xl overflow-hidden">
            <div class="p-4 border-b border-slate-800">
                <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest">🕒 Transaction History</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-900/50">
                        <tr>
                            <th class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">Date</th>
                            <th class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">Description</th>
                            <th class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Amount</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody" class="divide-y divide-slate-800">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="text-center pt-4 pb-10">
            <button onclick="logout()" class="text-slate-500 hover:text-slate-300 text-xs font-bold uppercase tracking-widest transition">
                Logout / Refresh Session
            </button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwvxl71LVk2Z1SohSZtrAbWRFRvpoUCrtXN3E7T6sdl9Q-bNG2-uUZggq9BU1WUOzT4/exec"; 
        let currentStudentID = "";

        async function login() {
            const name = document.getElementById('name').value;
            const pass = document.getElementById('pass').value;
            
            const res = await fetch(WEB_APP_URL, { 
                method: "POST", 
                body: JSON.stringify({ action: "loginStudent", name, password: pass }) 
            });
            const data = await res.json();
            
            if (data.success) {
                currentStudentID = data.student.id;
                localStorage.setItem('studentID', currentStudentID);
                localStorage.setItem('studentName', name);
                localStorage.setItem('studentPass', pass);

                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('bankSection').style.display = 'block';
                document.getElementById('displayName').innerText = "Hello, " + data.student.name;
                
                document.getElementById('balanceDisplay').innerText = "$" + parseFloat(data.student.balance).toFixed(2);
                document.getElementById('savingsDisplay').innerText = "$" + parseFloat(data.student.savings).toFixed(2);
                
                const portBody = document.getElementById('portfolioBody');
                if (data.student.portfolio && data.student.portfolio.length > 0) {
                    document.getElementById('portfolioSection').style.display = 'block';
                    let portHtml = "<ul class='grid grid-cols-2 sm:grid-cols-3 gap-3'>";
                    data.student.portfolio.forEach(stock => {
                        if(stock.shares > 0) {
                            portHtml += `<li class="bg-slate-900/50 p-3 rounded-xl border border-slate-800 flex justify-between items-center"><span class="font-bold text-white text-sm">${stock.ticker}</span> <span class="text-emerald-400 text-sm font-bold">${stock.shares} Shrs</span></li>`;
                        }
                    });
                    portHtml += "</ul>";
                    portBody.innerHTML = portHtml;
                } else {
                    document.getElementById('portfolioSection').style.display = 'none';
                }

                const body = document.getElementById('historyBody');
                body.innerHTML = '';
                data.history.forEach(r => {
                    const amount = parseFloat(r[4]);
                    const sign = amount > 0 ? "+" : "";
                    const row = `<tr class="hover:bg-slate-800/30 transition">
                        <td class="px-6 py-4 text-sm text-slate-400 font-mono">${new Date(r[0]).toLocaleDateString()}</td>
                        <td class="px-6 py-4 text-sm text-slate-200">${r[3]}</td>
                        <td class="px-6 py-4 text-sm text-right font-mono ${amount > 0 ? 'pos' : 'neg'}">${sign}${amount.toFixed(2)}</td>
                    </tr>`;
                    body.innerHTML = row + body.innerHTML;
                });
            } else {
                alert("Login failed. Check your name and password.");
            }
        }

        async function transfer(direction) {
            const amount = document.getElementById('transferAmount').value;
            if (!amount || amount <= 0) return alert("Enter an amount!");

            const res = await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "transferFunds",
                    studentID: currentStudentID,
                    amount: amount,
                    direction: direction
                })
            });
            
            const data = await res.json();
            if (data.success) {
                alert("Transfer Complete!");
                login(); 
                document.getElementById('transferAmount').value = "";
            } else {
                alert("Error: Insufficient Funds");
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        window.onload = () => {
            const savedName = localStorage.getItem('studentName');
            const savedPass = localStorage.getItem('studentPass');
            if(savedName && savedPass) {
                document.getElementById('name').value = savedName;
                document.getElementById('pass').value = savedPass;
                login();
            }
        }
    </script>
</body>
</html>
