<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
      .pos { color: #2ecc71; font-weight: bold; }
      .neg { color: #e74c3c; font-weight: bold; }
      .balance-card { border: 2px solid #ddd; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
      #bankSection { display: none; }
    </style>
  </head>
  <body>
    <div id="loginSection">
      <h1>💰 ClassBank Login</h1>
      <input type="text" id="name" placeholder="Full Name">
      <input type="password" id="pass" placeholder="Password">
      <button onclick="login()">Sign In</button>
    </div>

    <div id="bankSection">
      <h1 id="displayName"></h1>
      <div class="balance-card">
        <h3>Current Balance</h3>
        <h1 id="balanceDisplay"></h1>
      </div>
      
      <h3>Transaction History</h3>
      <table>
        <thead><tr><th>Date</th><th>Description</th><th>Amount</th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>

    <script>
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbze7zOoWLR6noWeTNNA8pmjtO0k3VDEVsVsUHFFQ04YRWvDNqX7AloPESFkj7ce2jiM/exec"; // PASTE YOUR URL HERE

      async function login() {
        const name = document.getElementById('name').value;
        const pass = document.getElementById('pass').value;
        
        const res = await fetch(WEB_APP_URL, { 
          method: "POST", 
          body: JSON.stringify({ action: "loginStudent", name, password: pass }) 
        });
        const data = await res.json();
        
        if (data.success) {
          document.getElementById('loginSection').style.display = 'none';
          document.getElementById('bankSection').style.display = 'block';
          document.getElementById('displayName').innerText = "Hello, " + data.student.name;
          document.getElementById('balanceDisplay').innerText = "$" + data.student.balance;
          
          const body = document.getElementById('historyBody');
          body.innerHTML = '';
          // Ledger returns: Date, ID, Type, Description, Change, Balance
          data.history.forEach(r => {
            const amount = parseFloat(r[4]);
            const sign = amount > 0 ? "+" : "";
            const row = `<tr>
              <td>${new Date(r[0]).toLocaleDateString()}</td>
              <td>${r[3]}</td>
              <td class="${amount > 0 ? 'pos' : 'neg'}">${sign}${amount.toFixed(2)}</td>
            </tr>`;
            body.innerHTML = row + body.innerHTML; // Newest on top
          });
        } else {
          alert("Login failed. Check your name and password.");
        }
      }
    </script>
  </body>
</html>
