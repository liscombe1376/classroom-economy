<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager | ClassBank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; color: #f8fafc; }
        .glass-card { background: #161d2f; border: 1px solid #2d3748; }
        input { background: #1f2937 !important; border: 1px solid #374151 !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">🛠️ STEM Store Inventory</h1>
                <p class="text-slate-400">Add, edit, or remove parts from the student shop</p>
            </div>
            <button onclick="location.href='admin.html'" class="text-slate-400 hover:text-white transition">← Back to Admin</button>
        </header>

        <div class="glass-card p-6 rounded-3xl mb-8 border-l-4 border-emerald-500 shadow-xl">
            <h2 class="text-lg font-bold mb-4 uppercase tracking-wider text-emerald-400">Add New Part</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs text-slate-500 mb-1">Item Name</label>
                    <input type="text" id="newName" placeholder="e.g. High Torque Motor" class="w-full p-3 rounded-xl">
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">Price</label>
                    <input type="number" id="newPrice" placeholder="0.00" class="w-full p-3 rounded-xl font-mono">
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">Details</label>
                    <input type="text" id="newDesc" placeholder="e.g. 12V DC" class="w-full p-3 rounded-xl">
                </div>
            </div>
            <button onclick="saveItem()" class="mt-4 w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-emerald-900/20">
                Confirm & Add to Catalog
            </button>
        </div>

        <div class="glass-card rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-4 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center">
                <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400">Active Catalog</h2>
                <span id="itemCount" class="text-xs bg-slate-800 px-2 py-1 rounded text-slate-400">0 Items</span>
            </div>
            <div id="inventoryList" class="divide-y divide-slate-800">
                <div class="p-10 text-center text-slate-600 animate-pulse">Fetching inventory from Google Sheets...</div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyxIWLy0J30R7w2cnlTN9EFiGUt4UoSqqu54MYPD6a_s6O6AVldVnxrgZHEVY03ChG4/exec";

        async function loadInventory() {
            const response = await fetch(WEB_APP_URL + "?action=getStoreItems");
            const items = await response.json();
            const list = document.getElementById('inventoryList');
            document.getElementById('itemCount').innerText = `${items.length} Items`;
            list.innerHTML = '';

            if (items.length === 0) {
                list.innerHTML = `<div class="p-10 text-center text-slate-500 italic text-sm">The shop is currently empty.</div>`;
                return;
            }

            items.forEach((item, index) => {
                const rowNum = index + 2; 
                list.innerHTML += `
                    <div class="p-5 flex justify-between items-center hover:bg-slate-800/30 transition group">
                        <div class="flex-grow">
                            <h3 class="font-bold text-white text-lg">${item[0]}</h3>
                            <p class="text-sm text-slate-500">${item[2] || 'No description provided'}</p>
                        </div>
                        <div class="flex items-center gap-8">
                            <span class="font-mono font-bold text-blue-400 text-xl">$${parseFloat(item[1]).toFixed(2)}</span>
                            <button onclick="deleteItem(${rowNum})" class="bg-rose-500/10 hover:bg-rose-500 text-rose-500 hover:text-white p-2 px-4 rounded-xl transition text-sm font-bold">
                                Remove
                            </button>
                        </div>
                    </div>`;
            });
        }

        async function saveItem() {
            const name = document.getElementById('newName').value;
            const price = document.getElementById('newPrice').value;
            const desc = document.getElementById('newDesc').value;

            if(!name || !price) return alert("Please enter at least a name and a price.");

            const res = await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ action: "addStoreItem", name, price, desc })
            });
            const data = await res.json();
            if(data.success) {
                document.getElementById('newName').value = '';
                document.getElementById('newPrice').value = '';
                document.getElementById('newDesc').value = '';
                loadInventory();
            }
        }

        async function deleteItem(row) {
            if(!confirm("Are you sure? This item will vanish from the student store immediately.")) return;
            const res = await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ action: "deleteStoreItem", row: row })
            });
            const data = await res.json();
            if(data.success) loadInventory();
        }

        loadInventory();
    </script>
</body>
</html>
