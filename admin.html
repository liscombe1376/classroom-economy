<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
      input:disabled { background: transparent; border: none; color: inherit; }
    </style>
  </head>
  <body>
    <h1>👨‍🏫 Teacher Admin Panel</h1>
    <a href="index.html">← Back to POS</a>
    
    <section>
      <input type="text" id="name" placeholder="Student Name">
      <input type="text" id="pass" placeholder="Password">
      <button onclick="createNewStudent()">➕ Add Student</button>
    </section>

    <table>
      <thead><tr><th>ID</th><th>Name</th><th>Balance</th><th>Actions</th></tr></thead>
      <tbody id="studentBody"></tbody>
    </table>

    <script>
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbze7zOoWLR6noWeTNNA8pmjtO0k3VDEVsVsUHFFQ04YRWvDNqX7AloPESFkj7ce2jiM/exec";

      async function callServer(payload) {
        const response = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
        return await response.json();
      }

      async function loadStudents() {
        const students = await callServer({ action: "getAllStudents" });
        const body = document.getElementById('studentBody');
        body.innerHTML = '';
        students.forEach(s => {
          body.innerHTML += `<tr id="row-${s[0]}">
            <td>${s[0]}</td>
            <td><input type="text" id="name-${s[0]}" value="${s[1]}" disabled></td>
            <td><input type="number" id="bal-${s[0]}" value="${s[3]}" disabled></td>
            <td>
              <button id="btn-${s[0]}" onclick="toggleEdit('${s[0]}')">✏️ Edit</button>
              <button onclick="requestCard('${s[0]}')">🖨️ Print</button>
            </td>
          </tr>`;
        });
      }

      function toggleEdit(id) {
        const n = document.getElementById(`name-${id}`);
        const b = document.getElementById(`bal-${id}`);
        const btn = document.getElementById(`btn-${id}`);
        
        if (n.disabled) {
          n.disabled = false; b.disabled = false;
          btn.innerText = "💾 Save";
        } else {
          saveStudent(id, n.value, b.value);
          n.disabled = true; b.disabled = true;
          btn.innerText = "✏️ Edit";
        }
      }

      async function saveStudent(id, name, balance) {
        await callServer({ action: "updateStudent", id: id, name: name, balance: balance });
        alert("Student updated!");
      }

      async function createNewStudent() {
        await callServer({ action: "addStudent", name: document.getElementById('name').value, password: document.getElementById('pass').value });
        loadStudents();
      }

      async function requestCard(id) {
        alert("Generating card... please wait.");
        const response = await fetch(WEB_APP_URL, { 
          method: "POST", 
          body: JSON.stringify({ action: "generateStudentCard", studentId: id }) 
        });
        const result = await response.json();
        if (typeof result === 'string' && result.startsWith("http")) {
          window.open(result, '_blank');
        } else {
          alert("Error: " + result);
        }
      }

      loadStudents();
    </script>
  </body>
</html>
