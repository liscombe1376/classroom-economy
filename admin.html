<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
  </head>
  <body>
    <h1>👨‍🏫 Teacher Admin Panel</h1>
    <a href="index.html">← Back to POS</a>
    
    <section>
      <input type="text" id="name" placeholder="Student Name">
      <input type="text" id="pass" placeholder="Password">
      <button onclick="createNewStudent()">➕ Add Student</button>
    </section>

    <table>
      <thead><tr><th>ID</th><th>Name</th><th>Balance</th><th>Actions</th></tr></thead>
      <tbody id="studentBody"></tbody>
    </table>

    <script>
      // Make sure this URL matches your deployed Web App URL
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw89wtWWnNKUK4Aev3Y06Yu4CI7TTpkndiMviWvDEzSZaUWi03ZS-2it0Gu8vY2UMRM/exec";

      async function callServer(payload) {
        const response = await fetch(WEB_APP_URL, { 
          method: "POST", 
          body: JSON.stringify(payload) 
        });
        return await response.json();
      }

      async function loadStudents() {
        const students = await callServer({ action: "getAllStudents" });
        const body = document.getElementById('studentBody');
        body.innerHTML = '';
        students.forEach(s => {
          body.innerHTML += `<tr>
            <td>${s[0]}</td>
            <td>${s[1]}</td>
            <td>$${s[3]}</td>
            <td><button onclick="requestCard('${s[0]}')">🖨️ Print</button></td>
          </tr>`;
        });
      }

      async function createNewStudent() {
        const name = document.getElementById('name').value;
        const pass = document.getElementById('pass').value;
        await callServer({ action: "addStudent", name: name, password: pass });
        loadStudents();
      }

      async function requestCard(id) {
        alert("Generating card... please wait a moment.");
        // We now expect the server to return the URL string directly
        const response = await fetch(WEB_APP_URL, { 
          method: "POST", 
          body: JSON.stringify({ action: "generateStudentCard", studentId: id }) 
        });
        
        const result = await response.json();
        
        // If the result is a URL string, open it
        if (typeof result === 'string' && result.startsWith("http")) {
          window.open(result, '_blank');
        } else {
          alert("Error: " + (result || "Unknown error occurred."));
        }
      }

      loadStudents();
    </script>
  </body>
</html>
