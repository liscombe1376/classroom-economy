<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
      input:disabled { background: transparent; border: none; color: inherit; }
      /* Styled buttons to sit side-by-side */
      .action-row { display: flex; gap: 10px; margin-bottom: 20px; }
      .print-all-btn { background-color: #2ecc71; color: white; flex: 1; margin: 0; }
      .leaderboard-btn { background-color: #f1c40f; color: #000; flex: 1; font-weight: bold; margin: 0; }
      
      /* Market Control Styles */
      .market-section { 
        background: #fdf2f2; 
        padding: 15px; 
        border-radius: 8px; 
        border: 1px solid #facccc; 
        margin-top: 30px; 
        margin-bottom: 30px;
      }
      .crisis-btn { color: white; flex: 1; font-weight: bold; border: none; }
      .disaster { background-color: #e67e22; }
      .inflation { background-color: #d35400; }
      .war { background-color: #c0392b; }
      .recovery { background-color: #27ae60; color: white; width: 100%; margin-top: 10px; }
      
      table { width: 100%; }
    </style>
  </head>
  <body>
    <h1>👨‍🏫 Teacher Admin Panel</h1>
    <a href="index.html">← Back to POS</a>
    
    <section class="action-row">
      <button class="print-all-btn" onclick="runPrintClassQRs()">🖨️ Print All Class QR Codes</button>
      <button class="leaderboard-btn" onclick="window.location.href='leaderboard.html'">🏆 View Leaderboard</button>
    </section>
    
    <section class="market-section">
      <h3 style="color: #c0392b; margin-top: 0;">📉 Global Economic Events</h3>
      <p style="font-size: 0.9rem; color: #666;">Warning: These buttons instantly change all stock prices in the Market tab.</p>
      <div class="action-row">
        <button class="crisis-btn disaster" onclick="triggerCrisis('Natural Disaster', 0.10)">🌪️ Disaster (-10%)</button>
        <button class="crisis-btn inflation" onclick="triggerCrisis('Oil Inflation', 0.25)">📉 Inflation (-25%)</button>
        <button class="crisis-btn war" onclick="triggerCrisis('Global Conflict', 0.50)">💣 War (-50%)</button>
      </div>
      <button class="recovery" onclick="triggerCrisis('Market Boom', -0.20)">🚀 Economic Recovery (+20%)</button>
    </section>

    <section>
      <h3>Add New Student</h3>
      <input type="text" id="name" placeholder="Student Name">
      <input type="text" id="pass" placeholder="Password">
      <button onclick="createNewStudent()">➕ Add Student</button>
    </section>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Password</th>
          <th>Balance</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="studentBody"></tbody>
    </table>

    <script>
      // MAKE SURE THIS URL MATCHES YOUR LATEST DEPLOYMENT
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwXedSG4RJLOAfAapGxS5pjv-6zZ4mJTvCzIuunT4NsPe3UIbnLFe2J3qpiNBs6SfOo/exec";

      async function callServer(payload) {
        const response = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
        return await response.json();
      }

      // --- MARKET CRISIS FUNCTION ---
      async function triggerCrisis(name, percent) {
        const message = percent > 0 
          ? `Are you sure? This will CRASH the market by ${percent * 100}%!` 
          : `Apply a market recovery of ${Math.abs(percent * 100)}%?`;
          
        if (!confirm(message)) return;
        
        try {
          const res = await callServer({ 
            action: "triggerMarketEvent", 
            eventName: name, 
            dropPercent: percent 
          });
          if(res.success) alert("Market Updated: " + name);
          else alert("Error triggering event.");
        } catch (err) {
          alert("Connection failed.");
        }
      }

      async function runPrintClassQRs() {
        const win = window.open("", "_blank");
        win.document.write("<html><body><h1 style='font-family:sans-serif;'>Generating QR Sheet... Please wait.</h1></body></html>");
        
        try {
          const result = await callServer({ action: "getPrintData" });
          if (typeof result === 'string' && result.startsWith("Error")) {
            win.document.write("<h1>Server Error:</h1><p>" + result + "</p>");
            return;
          }

          let html = `<html><body style="font-family:sans-serif; text-align:center;">`;
          html += `<h1>Class QR Codes</h1><div style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center;">`;
          
          result.forEach(s => {
            let qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(s[0]);
            html += `<div style="border:1px solid #ccc; padding:10px; border-radius:8px; width:160px; margin:10px;">
                        <p style="font-weight:bold;">${s[1]}</p>
                        <img src="${qrUrl}" style="width:150px; height:150px;">
                      </div>`;
          });
          
          html += `</div><script>setTimeout(function(){ window.print(); }, 2000);<\/script></body></html>`;
          win.document.open();
          win.document.write(html);
          win.document.close();
        } catch (err) {
          win.document.write("<h1>Connection Error:</h1><p>Check your internet or deployment settings.</p>");
        }
      }

      async function loadStudents() {
        const students = await callServer({ action: "getStudents" }); 
        const body = document.getElementById('studentBody');
        
        if (!students || students.length === 0) {
            body.innerHTML = '<tr><td colspan="5">No students found.</td></tr>';
            return;
        }

        body.innerHTML = '';
        students.forEach(s => {
          body.innerHTML += `<tr>
            <td>${s[0]}</td>
            <td><input type="text" id="name-${s[0]}" value="${s[1]}" disabled></td>
            <td><input type="text" id="pass-${s[0]}" value="${s[2]}" disabled></td>
            <td><input type="number" id="bal-${s[0]}" value="${s[3]}" disabled></td>
            <td><button id="btn-${s[0]}" onclick="toggleEdit('${s[0]}')">✏️ Edit</button></td>
          </tr>`;
        });
      }

      function toggleEdit(id) {
        const n = document.getElementById(`name-${id}`);
        const p = document.getElementById(`pass-${id}`); 
        const b = document.getElementById(`bal-${id}`);
        const btn = document.getElementById(`btn-${id}`);

        if (n.disabled) { 
          n.disabled = false; 
          p.disabled = false; 
          b.disabled = false; 
          btn.innerText = "💾 Save"; 
        } else { 
          saveStudent(id, n.value, b.value, p.value); 
          n.disabled = true; 
          p.disabled = true; 
          b.disabled = true; 
          btn.innerText = "✏️ Edit"; 
        }
      }

      async function saveStudent(id, name, balance, password) {
        const res = await callServer({ 
          action: "updateStudent", 
          id: id, 
          name: name, 
          balance: balance, 
          password: password 
        });
        if(res.success) alert("Student updated!");
        else alert("Error saving student.");
      }

      async function createNewStudent() {
        const name = document.getElementById('name').value;
        const pass = document.getElementById('pass').value;
        if(!name || !pass) return alert("Enter name and password");
        await callServer({ action: "addStudent", name: name, password: pass });
        document.getElementById('name').value = '';
        document.getElementById('pass').value = '';
        loadStudents();
      }

      loadStudents();
    </script>
  </body>
</html>
