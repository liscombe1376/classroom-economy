<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
      /* Force Dark Mode Consistency */
      :root { color-scheme: dark; }
      
      body { 
        max-width: 1200px; 
        background-color: #121212 !important; 
        color: #e0e0e0 !important; 
      }

      input:disabled { background: transparent; border: none; color: inherit; }
      
      .action-row { display: flex; gap: 10px; margin-bottom: 20px; }
      .print-all-btn { background-color: #2ecc71; color: white; flex: 1; margin: 0; }
      .leaderboard-btn { background-color: #f1c40f; color: #000; flex: 1; font-weight: bold; margin: 0; }
      
      /* Market Dashboard Styles */
      .market-dashboard { 
        background: #1e1e1e; 
        color: white; 
        padding: 20px; 
        border-radius: 12px; 
        margin-top: 30px; 
        border: 2px solid #333;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      .status-box {
        background: #2a2a2a;
        padding: 15px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        border: 1px solid #444;
      }
      .market-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
      .market-table th { color: #94a3b8; text-align: left; }
      .market-table td { border-bottom: 1px solid #333; padding: 12px 0; }
      
      .crisis-btn { color: white; flex: 1; font-weight: bold; border: none; padding: 10px; cursor: pointer; border-radius: 4px; }
      .disaster { background-color: #e67e22; }
      .inflation { background-color: #d35400; }
      .war { background-color: #c0392b; }
      .recovery { background-color: #27ae60; width: 100%; margin-top: 10px; border: none; color: white; padding: 10px; cursor: pointer; border-radius: 4px; }
      
      /* Student Table Cleanup */
      table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
      thead th { background: #121212; position: sticky; top: 0; }
      tbody tr { background: #1e1e1e; transition: background 0.2s; }
      tbody tr:hover { background: #252525; }
      td, th { padding: 12px !important; text-align: left; border-bottom: 1px solid #333 !important; }
      
      input[type="text"], input[type="number"] {
        background: #2a2a2a !important;
        border: 1px solid #444 !important;
        color: white !important;
      }
    </style>
  </head>
  <body>
    <h1>👨‍🏫 Teacher Admin Panel</h1>
    <a href="index.html" style="color: #60a5fa;">← Back to POS</a>
    
    <section class="action-row" style="margin-top:20px;">
      <button class="print-all-btn" onclick="runPrintClassQRs()">🖨️ Print All Class QR Codes</button>
      <button class="leaderboard-btn" onclick="window.location.href='leaderboard.html'">🏆 View Leaderboard</button>
    </section>

    <section class="market-dashboard">
      <h2 style="color: #f1c40f; margin-top: 0;">🏛️ Wall Street Control Center</h2>
      
      <div class="status-box">
        <div>
          <span style="font-size: 0.8rem; color: #94a3b8; display: block;">EXCHANGE STATUS</span>
          <strong id="marketStatusLabel" style="font-size: 1.2rem;">LOADING...</strong>
        </div>
        <div>
          <button onclick="setMarketStatus('OPEN')" style="background: #22c55e; color: white; border:none; padding: 8px 15px; border-radius:4px; cursor:pointer;">OPEN</button>
          <button onclick="setMarketStatus('CLOSED')" style="background: #ef4444; color: white; border:none; padding: 8px 15px; border-radius:4px; cursor:pointer;">CLOSE</button>
        </div>
      </div>

      <h3>📊 Manual Price Adjustment</h3>
      <table class="market-table">
        <thead>
          <tr>
            <th>TICKER</th>
            <th>PRICE</th>
            <th>NEW PRICE</th>
            <th>ACTION</th>
          </tr>
        </thead>
        <tbody id="marketAdminBody"></tbody>
      </table>

      <h3 style="color: #f87171; margin-top: 20px;">📉 Global Economic Events</h3>
      <div class="action-row">
        <button class="crisis-btn disaster" onclick="triggerCrisis('Natural Disaster', 0.10)">🌪️ Disaster (-10%)</button>
        <button class="crisis-btn inflation" onclick="triggerCrisis('Oil Inflation', 0.25)">📉 Inflation (-25%)</button>
        <button class="crisis-btn war" onclick="triggerCrisis('Global Conflict', 0.50)">💣 War (-50%)</button>
      </div>
      <button class="recovery" onclick="triggerCrisis('Market Boom', -0.20)">🚀 Economic Recovery (+20%)</button>
    </section>

    <section style="margin-top:40px; background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333;">
      <h3 style="margin-top:0;">Add New Student</h3>
      <div style="display: flex; gap: 10px;">
        <input type="text" id="name" placeholder="Student Name" style="flex: 2;">
        <input type="text" id="pass" placeholder="Password" style="flex: 1;">
        <button onclick="createNewStudent()" style="margin:0;">➕ Add</button>
      </div>
    </section>

    <table style="margin-top: 20px;">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Password</th>
          <th>Balance</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="studentBody"></tbody>
    </table>

    <script>
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyxIWLy0J30R7w2cnlTN9EFiGUt4UoSqqu54MYPD6a_s6O6AVldVnxrgZHEVY03ChG4/exec";

      async function callServer(payload) {
        const response = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
        return await response.json();
      }

      async function loadMarketAdmin() {
        const marketData = await callServer({ action: "getMarketData" });
        const statusData = await callServer({ action: "getMarketStatus" });
        
        const statusLabel = document.getElementById('marketStatusLabel');
        statusLabel.innerText = statusData.status;
        statusLabel.style.color = statusData.status === "OPEN" ? "#22c55e" : "#ef4444";

        const body = document.getElementById('marketAdminBody');
        body.innerHTML = marketData.map(stock => `
          <tr>
            <td><strong>${stock[0]}</strong></td>
            <td style="color: #2ecc71;">$${parseFloat(stock[2]).toFixed(2)}</td>
            <td><input type="number" id="price-${stock[0]}" style="width: 80px; padding: 4px; margin:0;" placeholder="$"></td>
            <td><button onclick="updatePrice('${stock[0]}')" style="background: #3b82f6; padding: 4px 8px; font-size: 0.7rem; margin:0;">SET</button></td>
          </tr>
        `).join('');
      }

      async function setMarketStatus(status) {
        await callServer({ action: "toggleMarket", status: status });
        loadMarketAdmin();
      }

      async function updatePrice(ticker) {
        const val = document.getElementById(`price-${ticker}`).value;
        if(!val) return;
        const res = await callServer({ action: "updateSingleStock", ticker: ticker, newPrice: val });
        if(res.success) {
          alert(`${ticker} set to $${val}`);
          loadMarketAdmin();
        }
      }

      async function triggerCrisis(name, percent) {
        const message = percent > 0 ? `Crash market by ${percent * 100}%?` : `Recovery of ${Math.abs(percent * 100)}%?`;
        if (!confirm(message)) return;
        const res = await callServer({ action: "triggerMarketEvent", eventName: name, dropPercent: percent });
        if(res.success) {
          alert("Market Updated: " + name);
          loadMarketAdmin();
        }
      }

      async function runPrintClassQRs() {
        const win = window.open("", "_blank");
        win.document.write("<html><body><h1>Generating QR Sheet...</h1></body></html>");
        const result = await callServer({ action: "getPrintData" });
        let html = `<html><body style="font-family:sans-serif; text-align:center;"><h1>Class QR Codes</h1><div style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center;">`;
        result.forEach(s => {
          let qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(s[0]);
          html += `<div style="border:1px solid #ccc; padding:10px; border-radius:8px; width:160px;">
                    <p style="font-weight:bold;">${s[1]}</p>
                    <img src="${qrUrl}" style="width:150px; height:150px;">
                  </div>`;
        });
        html += `</div><script>setTimeout(function(){ window.print(); }, 2000);<\/script></body></html>`;
        win.document.open(); win.document.write(html); win.document.close();
      }

      async function loadStudents() {
        const students = await callServer({ action: "getStudents" }); 
        const body = document.getElementById('studentBody');
        body.innerHTML = '';
        students.forEach(s => {
          body.innerHTML += `<tr>
            <td>${s[0]}</td>
            <td><input type="text" id="name-${s[0]}" value="${s[1]}" disabled></td>
            <td><input type="text" id="pass-${s[0]}" value="${s[2]}" disabled></td>
            <td><input type="number" id="bal-${s[0]}" value="${parseFloat(s[3]).toFixed(2)}" disabled></td>
            <td><button id="btn-${s[0]}" onclick="toggleEdit('${s[0]}')" style="margin:0;">✏️</button></td>
          </tr>`;
        });
      }

      function toggleEdit(id) {
        const n = document.getElementById(`name-${id}`);
        const p = document.getElementById(`pass-${id}`); 
        const b = document.getElementById(`bal-${id}`);
        const btn = document.getElementById(`btn-${id}`);
        if (n.disabled) { 
          n.disabled = p.disabled = b.disabled = false; btn.innerText = "💾"; 
        } else { 
          saveStudent(id, n.value, b.value, p.value); 
          n.disabled = p.disabled = b.disabled = true; btn.innerText = "✏️"; 
        }
      }

      async function saveStudent(id, name, balance, password) {
        await callServer({ action: "updateStudent", id: id, name: name, balance: balance, password: password });
      }

      async function createNewStudent() {
        const name = document.getElementById('name').value;
        const pass = document.getElementById('pass').value;
        if(!name || !pass) return alert("Enter name and password");
        await callServer({ action: "addStudent", name: name, password: pass });
        document.getElementById('name').value = document.getElementById('pass').value = '';
        loadStudents();
      }

      loadStudents();
      loadMarketAdmin();
    </script>
  </body>
</html>
