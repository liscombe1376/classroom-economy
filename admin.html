<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Admin | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; color: #f8fafc; }
        .glass-card { background: #161d2f; border: 1px solid #2d3748; }
        input:disabled { background: transparent !important; border: none !important; color: #94a3b8 !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-white">Teacher Admin Terminal</h1>
                <p class="text-slate-400 text-sm">Economy Management & Student Oversight</p>
            </div>
            <a href="index.html" class="text-blue-400 hover:text-blue-300 font-semibold text-sm transition">← Exit to POS</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <button onclick="runPrintClassQRs()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition">
                🖨️ Generate Class QR Sheet
            </button>
            <button onclick="window.location.href='leaderboard.html'" class="bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold py-3 px-6 rounded-xl shadow-lg transition">
                🏆 Global Wealth Leaderboard
            </button>
            <button onclick="window.location.href='inventory.html'" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition">
                📦 Manage Store Inventory
            </button>
        </div>

        <div class="glass-card rounded-2xl p-6 mb-8 shadow-2xl">
            <div class="flex justify-between items-center border-b border-slate-700 pb-4 mb-6">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    <span class="text-blue-500">🏛️</span> Wall Street Control
                </h2>
                <div class="flex items-center gap-3 bg-slate-900 p-1.5 rounded-lg border border-slate-700">
                    <span id="marketStatusLabel" class="px-3 font-bold text-xs uppercase tracking-wider">LOADING...</span>
                    <button onclick="setMarketStatus('OPEN')" class="bg-emerald-500/10 text-emerald-500 hover:bg-emerald-500 hover:text-white px-3 py-1 rounded text-xs font-bold transition">OPEN</button>
                    <button onclick="setMarketStatus('CLOSED')" class="bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white px-3 py-1 rounded text-xs font-bold transition">CLOSE</button>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-500 text-xs uppercase tracking-widest border-b border-slate-800">
                            <th class="pb-3 pl-2">Ticker</th>
                            <th class="pb-3">Live Price</th>
                            <th class="pb-3">Manual Adjustment</th>
                            <th class="pb-3 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="marketAdminBody" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-800">
                <h3 class="text-rose-500 text-sm font-bold uppercase tracking-tighter mb-4">Macro-Economic Triggers</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <button class="bg-slate-800 hover:bg-orange-600 text-white text-xs py-2 px-3 rounded-lg transition" onclick="triggerCrisis('Natural Disaster', 0.10)">🌪️ Disaster (-10%)</button>
                    <button class="bg-slate-800 hover:bg-orange-700 text-white text-xs py-2 px-3 rounded-lg transition" onclick="triggerCrisis('Oil Inflation', 0.25)">📉 Inflation (-25%)</button>
                    <button class="bg-slate-800 hover:bg-rose-700 text-white text-xs py-2 px-3 rounded-lg transition" onclick="triggerCrisis('Global Conflict', 0.50)">💣 War (-50%)</button>
                    <button class="bg-emerald-600/20 text-emerald-500 hover:bg-emerald-600 hover:text-white text-xs py-2 px-3 rounded-lg transition" onclick="triggerCrisis('Market Boom', -0.20)">🚀 Recovery (+20%)</button>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-6 shadow-2xl">
            <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                <span class="text-blue-500">👥</span> Student Roster
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                <input type="text" id="name" placeholder="Full Name" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 transition">
                <input type="text" id="pass" placeholder="Initial PIN" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 transition">
                <button onclick="createNewStudent()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded-lg transition">+ Add Student</button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-500 text-xs uppercase tracking-widest border-b border-slate-800">
                            <th class="pb-3 pl-2">ID</th>
                            <th class="pb-3">Name</th>
                            <th class="pb-3">Pin</th>
                            <th class="pb-3">Balance</th>
                            <th class="pb-3 text-right">Edit</th>
                        </tr>
                    </thead>
                    <tbody id="studentBody" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-znjofeXV5QyLj0P41uxd33tcQFhIAUlbIm9wgLo6dz9imJFNvw2fMfKRj_BmBxPm/exec";

        async function callServer(payload) {
            const response = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
            return await response.json();
        }

        async function loadMarketAdmin() {
            const marketData = await callServer({ action: "getMarketData" });
            const statusData = await callServer({ action: "getMarketStatus" });
            
            const statusLabel = document.getElementById('marketStatusLabel');
            statusLabel.innerText = statusData.status;
            statusLabel.className = `px-3 font-bold text-xs uppercase tracking-wider ${statusData.status === 'OPEN' ? 'text-emerald-500' : 'text-rose-500'}`;

            const body = document.getElementById('marketAdminBody');
            body.innerHTML = marketData.map(stock => `
                <tr class="hover:bg-slate-800/30 transition">
                    <td class="py-4 pl-2 font-bold text-white">${stock[0]}</td>
                    <td class="py-4 text-emerald-400 font-mono">$${parseFloat(stock[2]).toFixed(2)}</td>
                    <td class="py-4">
                        <input type="number" id="price-${stock[0]}" class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm w-24 focus:border-blue-500 outline-none" placeholder="$">
                    </td>
                    <td class="py-4 text-right">
                        <button onclick="updatePrice('${stock[0]}')" class="text-blue-400 hover:text-white text-xs font-bold uppercase">Update</button>
                    </td>
                </tr>
            `).join('');
        }

        async function loadStudents() {
            const students = await callServer({ action: "getStudents" }); 
            const body = document.getElementById('studentBody');
            body.innerHTML = students.map(s => `
                <tr class="hover:bg-slate-800/30 transition">
                    <td class="py-4 pl-2 text-slate-500 text-xs font-mono">${s[0]}</td>
                    <td class="py-4"><input type="text" id="name-${s[0]}" value="${s[1]}" disabled class="bg-transparent text-slate-200"></td>
                    <td class="py-4"><input type="text" id="pass-${s[0]}" value="${s[2]}" disabled class="bg-transparent text-slate-400 w-16"></td>
                    <td class="py-4 text-white font-semibold">$${parseFloat(s[3]).toFixed(2)}</td>
                    <td class="py-4 text-right">
                        <button id="btn-${s[0]}" onclick="toggleEdit('${s[0]}')" class="text-slate-400 hover:text-white transition">✏️</button>
                    </td>
                </tr>
            `).join('');
        }

        function toggleEdit(id) {
            const n = document.getElementById(`name-${id}`);
            const p = document.getElementById(`pass-${id}`); 
            const btn = document.getElementById(`btn-${id}`);
            if (n.disabled) { 
                n.disabled = p.disabled = false; btn.innerText = "💾"; 
            } else { 
                saveStudent(id, n.value, 0, p.value); 
                n.disabled = p.disabled = true; btn.innerText = "✏️"; 
            }
        }

        async function saveStudent(id, name, balance, password) { await callServer({ action: "updateStudent", id, name, balance, password }); }
        async function setMarketStatus(status) { await callServer({ action: "toggleMarket", status }); loadMarketAdmin(); }
        async function updatePrice(ticker) {
            const val = document.getElementById(`price-${ticker}`).value;
            if(!val) return;
            await callServer({ action: "updateSingleStock", ticker, newPrice: val });
            loadMarketAdmin();
        }
        async function triggerCrisis(name, percent) {
            if (!confirm(`Trigger ${name}?`)) return;
            await callServer({ action: "triggerMarketEvent", eventName: name, dropPercent: percent });
            loadMarketAdmin();
        }
        async function createNewStudent() {
            const name = document.getElementById('name').value;
            const pass = document.getElementById('pass').value;
            if(!name || !pass) return alert("Missing info");
            await callServer({ action: "addStudent", name, password: pass });
            location.reload();
        }
        async function runPrintClassQRs() {
            const result = await callServer({ action: "getPrintData" });
            let html = `<body style="font-family:sans-serif; text-align:center;"><h1>Class QR Codes</h1><div style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center;">`;
            result.forEach(s => {
                let qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(s[0]);
                html += `<div style="border:1px solid #ccc; padding:10px; border-radius:8px; width:160px;"><p><b>${s[1]}</b></p><img src="${qrUrl}"></div>`;
            });
            const win = window.open();
            win.document.write(html + "</div><script>setTimeout(()=>window.print(), 1000)<\/script>");
        }

        loadStudents();
        loadMarketAdmin();
    </script>
</body>
</html>
